<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Naruto Cam FX</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="screen screen-active" id="cameraScreen">
      <video id="cameraVideo" autoplay playsinline muted></video>
      <canvas id="cameraCanvas"></canvas>

      <div class="hud">
        <div class="status-chip">
          <strong id="effectLabel">나선환</strong>
        </div>
        <div class="status-chip">
          <strong id="trackingLabel">오른손 대기중</strong>
        </div>
        <div class="status-chip status-chip-wide">
          <strong id="fingerLabel">IDX:- MID:- RNG:- PNK:- THB:-</strong>
        </div>
        <button class="back-button" id="backButton" type="button">뒤로</button>
      </div>

      <div class="error-toast" id="errorToast" hidden></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="app.js" defer></script>
</body>
</html>
